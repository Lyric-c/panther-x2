name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: '内核分支'
        default: 'vendor'
        required: true
        type: choice
        options:
          - 'vendor'
          - 'current'
          - 'edge'

env:
  TZ: Asia/Shanghai
  BOARD: panther-x2

jobs:
  Build-Kernel:
    name: Build Kernel [ panther-x2 ${{ inputs.BRANCH }} ]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache 2>/dev/null || true
          sudo apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* openjdk* mysql* php* mongodb* moby* snapd* 2>/dev/null || true
          sudo apt-get -qq autoremove --purge
          sudo apt-get -qq clean
          df -h /

      - name: Download Armbian build framework
        run: |
          git clone -q --single-branch --depth=1 --branch=main \
            https://github.com/armbian/build.git build
          echo "Armbian build cloned OK"

      - name: Apply userpatches
        run: |
          mkdir -p build/userpatches
          cp -rv ${GITHUB_WORKSPACE}/userpatches/* build/userpatches/
          echo "Userpatches applied OK"

      - name: Compile Kernel [ panther-x2 ${{ inputs.BRANCH }} ]
        working-directory: build
        run: |
          ./compile.sh kernel \
            BOARD=${BOARD} \
            BRANCH=${{ inputs.BRANCH }} \
            PREFER_DOCKER=yes \
            DEB_COMPRESS=xz \
            SHARE_LOG=yes

      - name: Install initrd tools
        run: sudo apt-get -qq update && sudo apt-get -qq install -y initramfs-tools u-boot-tools

      - name: Prepare Kernel (ophub format)
        working-directory: build/output/debs
        run: |
          # --- 1. Extract kernel version from linux-image deb ---
          Kernel_File=$(find . -maxdepth 1 -type f -name 'linux-image-*.deb' -printf '%f\n' | head -n 1)
          if [ -z "${Kernel_File}" ]; then
            echo "No kernel deb found!"; ls -la; exit 1
          fi
          KERNEL_VERSION=$(echo "${Kernel_File}" | cut -d '_' -f 5 | cut -d '-' -f 1)
          [[ ! "${KERNEL_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && KERNEL_VERSION="${KERNEL_VERSION}.0"
          echo "Kernel version (for tarball name): ${KERNEL_VERSION}"

          # --- 2. Extract all debs into a temp directory ---
          EXTRACT_DIR="/tmp/kernel-extract"
          rm -rf "${EXTRACT_DIR}"
          mkdir -p "${EXTRACT_DIR}"
          for deb in linux-*.deb; do
            echo "Extracting: ${deb}"
            dpkg -x "${deb}" "${EXTRACT_DIR}/"
          done

          # --- 3. Get actual kernel name from modules dir (matches uname -r) ---
          KERNEL_NAME=$(ls -d "${EXTRACT_DIR}/lib/modules/"*/ 2>/dev/null | head -1 | xargs basename)
          if [ -z "${KERNEL_NAME}" ]; then
            echo "ERROR: No modules directory found in extracted debs"
            ls -la "${EXTRACT_DIR}/lib/modules/" 2>/dev/null || echo "lib/modules not found"
            exit 1
          fi
          echo "Kernel name (matches uname -r): ${KERNEL_NAME}"

          # --- 4. Create ophub-format kernel tarballs ---
          WORK_DIR="../ophub-kernel"
          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}"
          cd "${EXTRACT_DIR}"

          # boot: rename files to use KERNEL_NAME, then tar (rebuild matches *{kernel_name})
          if [ -d boot ]; then
            # --- 4a. Generate uInitrd if missing (kernel-only build doesn't produce one) ---
            if ! ls boot/uInitrd-* boot/initrd.img-* >/dev/null 2>&1; then
              echo "No uInitrd found, generating via mkinitramfs..."
              ACTUAL_VER=$(ls -d lib/modules/*/ 2>/dev/null | head -1 | xargs basename)
              if [ -n "${ACTUAL_VER}" ] && [ -d "lib/modules/${ACTUAL_VER}" ]; then
                echo "Installing modules for ${ACTUAL_VER}..."
                sudo cp -a "lib/modules/${ACTUAL_VER}" "/lib/modules/${ACTUAL_VER}"
                sudo depmod -a "${ACTUAL_VER}" 2>/dev/null || true
                if command -v mkinitramfs >/dev/null 2>&1; then
                  sudo mkinitramfs -o "/tmp/initrd.img-${KERNEL_NAME}" "${ACTUAL_VER}"
                  echo "Initrd generated: $(ls -lh /tmp/initrd.img-${KERNEL_NAME} 2>/dev/null | awk '{print $5}')"
                fi
                sudo rm -rf "/lib/modules/${ACTUAL_VER}"
                if [ -f "/tmp/initrd.img-${KERNEL_NAME}" ]; then
                  if command -v mkimage >/dev/null 2>&1; then
                    mkimage -A arm64 -T ramdisk -C gzip \
                      -d "/tmp/initrd.img-${KERNEL_NAME}" "boot/uInitrd-${KERNEL_NAME}"
                  else
                    cp "/tmp/initrd.img-${KERNEL_NAME}" "boot/uInitrd-${KERNEL_NAME}"
                  fi
                  echo "Created: uInitrd-${KERNEL_NAME}"
                  sudo rm -f "/tmp/initrd.img-${KERNEL_NAME}"
                else
                  echo "WARNING: mkinitramfs failed, continuing without uInitrd"
                fi
              else
                echo "WARNING: No modules directory found in lib/modules"
              fi
            fi
            # --- 4b. Rename boot files to KERNEL_NAME ---
            for f in boot/vmlinuz-* boot/config-* boot/System.map-* boot/uInitrd-*; do
              [ -f "$f" ] || continue
              prefix="${f%%-*}"                           # boot/vmlinuz, boot/config, etc.
              newname="${prefix}-${KERNEL_NAME}"
              [ "$f" != "${newname}" ] && mv "$f" "${newname}"
            done
            rm -rf boot/dtb-* 2>/dev/null  # DTB provided via dtb-rockchip-*.tar.gz, not needed in boot
            # FAT32 boot doesn't support symlinks; provide Image/uInitrd as real file copies
            cp boot/vmlinuz-${KERNEL_NAME} boot/Image 2>/dev/null || true
            cp boot/uInitrd-${KERNEL_NAME} boot/uInitrd 2>/dev/null || true
            tar -czf "${GITHUB_WORKSPACE}/build/output/ophub-kernel/boot-${KERNEL_NAME}.tar.gz" \
              --owner=0 --group=0 -C boot $(ls boot/ 2>/dev/null)
            echo "Created: boot-${KERNEL_NAME}.tar.gz"
          fi

          # dtb: find dtb files, tar them at root (rebuild extracts to /boot/dtb/rockchip/)
          # Armian deb may place dtb under boot/dtb-*/rockchip/ or usr/lib/linux-image-*/rockchip/
          DTB_SRC=""
          for candidate in boot/dtb-*/rockchip usr/lib/linux-image-*/rockchip; do
            [ -d "${candidate}" ] && { DTB_SRC="${candidate}"; break; }
          done
          if [ -z "${DTB_SRC}" ]; then
            # Fallback: find any rockchip directory
            DTB_SRC=$(find boot usr -type d -name "rockchip" 2>/dev/null | head -1)
          fi
          echo "DTB source: ${DTB_SRC:-NOT FOUND}"
          if [ -n "${DTB_SRC}" ] && [ -d "${DTB_SRC}" ]; then
            tar -czf "${GITHUB_WORKSPACE}/build/output/ophub-kernel/dtb-rockchip-${KERNEL_NAME}.tar.gz" \
              --owner=0 --group=0 -C "${DTB_SRC}" .
            echo "Created: dtb-rockchip-${KERNEL_NAME}.tar.gz ($(tar -tzf ${GITHUB_WORKSPACE}/build/output/ophub-kernel/dtb-rockchip-${KERNEL_NAME}.tar.gz | wc -l) dtb files)"
          else
            echo "WARNING: No DTB directory found, creating empty dtb tarball"
            tar -czf "${GITHUB_WORKSPACE}/build/output/ophub-kernel/dtb-rockchip-${KERNEL_NAME}.tar.gz" \
              --owner=0 --group=0 --files-from /dev/null
          fi

          # modules: tar directly (KERNEL_NAME matches directory name from uname -r)
          if [ -d lib/modules ]; then
            tar -czf "${GITHUB_WORKSPACE}/build/output/ophub-kernel/modules-${KERNEL_NAME}.tar.gz" \
              --owner=0 --group=0 -C lib/modules .
            echo "Created: modules-${KERNEL_NAME}.tar.gz"
          fi

          # header: rename dir to linux-headers-{KERNEL_NAME}, tar contents directly (no nested dir)
          if [ -d usr/src ]; then
            old_hdr_dir=$(ls -d usr/src/linux-headers-*/ 2>/dev/null | head -1)
            [ -n "${old_hdr_dir}" ] && mv "${old_hdr_dir}" "usr/src/linux-headers-${KERNEL_NAME}"
            tar -czf "${GITHUB_WORKSPACE}/build/output/ophub-kernel/header-${KERNEL_NAME}.tar.gz" \
              --owner=0 --group=0 -C "usr/src/linux-headers-${KERNEL_NAME}" .
            echo "Created: header-${KERNEL_NAME}.tar.gz"
          fi

          # --- 5. Create sha256sums ---
          cd "${GITHUB_WORKSPACE}/build/output/ophub-kernel"
          sha256sum boot-*.tar.gz dtb-*.tar.gz modules-*.tar.gz header-*.tar.gz > sha256sums
          cat sha256sums

          # --- 6. Package with versioned subdirectory (rebuild expects {ver}/boot-*.tar.gz etc.) ---
          mkdir -p "../${KERNEL_VERSION}"
          mv * "../${KERNEL_VERSION}/"
          cd ..
          tar -czf "${KERNEL_VERSION}.tar.gz" --owner=0 --group=0 "${KERNEL_VERSION}"
          rm -rf "${KERNEL_VERSION}"
          echo "Packed: ${KERNEL_VERSION}.tar.gz"
          ls -la "${KERNEL_VERSION}.tar.gz"

          # --- 7. Export env vars for subsequent steps ---
          echo "KERNEL_VERSION=${KERNEL_VERSION}" >> "${GITHUB_ENV}"
          echo "KERNEL_NAME=${KERNEL_NAME}" >> "${GITHUB_ENV}"

      - name: Set kernel release tag
        run: |
          case "${{ inputs.BRANCH }}" in
            vendor)  KERNEL_TAG="kernel_rk35xx" ;;
            current) KERNEL_TAG="kernel_stable" ;;
            edge)    KERNEL_TAG="kernel_stable" ;;
            *)       KERNEL_TAG="kernel_stable" ;;
          esac
          echo "KERNEL_TAG=${KERNEL_TAG}" >> "${GITHUB_ENV}"
          echo "Kernel Release Tag: ${KERNEL_TAG}"

      - name: Upload Kernel to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ env.KERNEL_TAG }}"
          name: "${{ env.KERNEL_TAG }}"
          files: build/output/${{ env.KERNEL_VERSION }}.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
